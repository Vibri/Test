#Show SQL
spring.jpa.properties.hibernate.show_sql=true

#Format SQL
spring.jpa.properties.hibernate.format_sql=true

#Show bind values
# Spring Boot 3.0.2+
logging.level.org.hibernate.type.descriptor.sql=trace

spring.h2.console.enabled=true

spring.datasource.username=bookdb2user
spring.datasource.password=password
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/bookdb2?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
spring.jpa.database=mysql
spring.jpa.hibernate.ddl-auto=validate
spring.sql.init.mode=never
server.port=8081

spring.flyway.user=bookdb2admin
spring.flyway.password=password
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.defer-datasource-initialization=false
spring.flyway.locations=classpath:db/migration/common,classpath:db/migration/{vendor}

#spring.liquibase.change-log=db/changelog/changelog-master.xml
